<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>SPL Draft — Supabase SRI Hash Helper</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #06140f;
      color: #edf3ec;
      font-family: system-ui, sans-serif;
    }
    main {
      width: min(760px, calc(100vw - 32px));
      padding: 24px;
      border: 1px solid rgba(237,243,236,.2);
      border-radius: 16px;
      background: #0f2019;
    }
    h1 { margin-top: 0; }
    code, textarea {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    textarea {
      width: 100%;
      min-height: 110px;
      box-sizing: border-box;
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(237,243,236,.25);
      background: #06140f;
      color: #edf3ec;
      resize: vertical;
    }
    button {
      margin-top: 12px;
      padding: 11px 16px;
      border: 0;
      border-radius: 999px;
      background: #e8b94b;
      color: #1a1406;
      font-weight: 800;
      cursor: pointer;
    }
    #status {
      margin-top: 14px;
      font-weight: 700;
    }
    .ok { color: #74d68c; }
    .bad { color: #ff7373; }
  </style>
</head>
<body>
<main>
  <h1>Supabase SRI Hash Helper</h1>
  <p>Exact dependency:</p>
  <p><code>https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.5</code></p>

  <button id="calculateBtn" type="button">Calculate SHA-384 SRI Hash</button>

  <div id="status">Not calculated yet.</div>
  <textarea id="output" readonly placeholder="The SRI value will appear here."></textarea>
</main>

<script>
  const CDN_URL = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.5";

  function bytesToBase64(bytes) {
    let binary = "";
    const chunkSize = 0x8000;

    for (
      let offset = 0;
      offset < bytes.length;
      offset += chunkSize
    ) {
      binary += String.fromCharCode(
        ...bytes.subarray(
          offset,
          Math.min(
            offset + chunkSize,
            bytes.length
          )
        )
      );
    }

    return btoa(binary);
  }

  document
    .getElementById("calculateBtn")
    .addEventListener("click", async () => {
      const button =
          document.getElementById("calculateBtn"),
        status =
          document.getElementById("status"),
        output =
          document.getElementById("output");

      button.disabled = true;
      status.className = "";
      status.textContent =
        "Downloading the exact pinned file and hashing it…";
      output.value = "";

      try {
        const response =
          await fetch(
            CDN_URL,
            {
              cache: "no-store",
              mode: "cors"
            }
          );

        if (!response.ok) {
          throw new Error(
            `HTTP ${response.status}`
          );
        }

        const bytes =
          new Uint8Array(
            await response.arrayBuffer()
          );

        const digest =
          new Uint8Array(
            await crypto.subtle.digest(
              "SHA-384",
              bytes
            )
          );

        const integrity =
          `sha384-${bytesToBase64(digest)}`;

        output.value =
          [
            `URL: ${CDN_URL}`,
            `Bytes: ${bytes.length}`,
            `Integrity: ${integrity}`
          ].join("\n");

        status.className = "ok";
        status.textContent =
          "PASS — exact CDN file downloaded and SHA-384 hash calculated.";

        output.focus();
        output.select();
      } catch (error) {
        status.className = "bad";
        status.textContent =
          `FAILED — ${String(
            error && error.message || error
          )}`;
      } finally {
        button.disabled = false;
      }
    });
</script>
</body>
</html>
